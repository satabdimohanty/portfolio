<svg width="156" height="47" viewBox="0 0 156 47" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@1&amp;family=Poppins:wght@700&amp;display=swap');
      .logo-txt {
        font-family: 'Poppins', sans-serif;
        font-weight: 700;
        font-size: 26px;
        letter-spacing: -0.05em;
        fill: #FFFFFF;
      }
      .logo-italic {
        font-family: 'Instrument Serif', serif;
        font-style: italic;
        font-weight: 400;
        font-size: 32px;
        fill: #FFFFFF;
      }
      .logo-dot {
        fill: url(#logo-grad);
      }
    </style>
  </defs>
  
  <!-- Elegant custom typography -->
  <text x="8" y="31" class="logo-txt">
    satabdi<tspan class="logo-dot">.</tspan>
  </text>
  
  <!-- Themed visual grid line below logo -->
  <path d="M8 38H148" stroke="url(#logo-grad)" stroke-width="1.5" stroke-linecap="round" opacity="0.3" />
  <circle cx="148" cy="38" r="1.5" fill="#059669" opacity="0.6" />
  <circle cx="8" cy="38" r="1.5" fill="#10b981" opacity="0.6" />
</svg>
